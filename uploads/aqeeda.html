<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منارة العقيدة | Faith Minaret</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #C0392B; --primary-dark: #A93226; --bg1: #0A2540; --bg2: #12375A; --text: #FEF5DC; --card-bg: rgba(255,255,255,0.08); --radius: 1.5rem; }
        body{font-family:'Tajawal','Nunito',sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;margin:0;display:flex;flex-direction:column;direction:rtl}
        html[dir="ltr"] body{direction:ltr;font-family:'Nunito','Tajawal',sans-serif}
        .header{background:rgba(10,37,64,0.9);backdrop-filter:blur(12px);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(212,160,23,0.3)}
        .back-btn{background:var(--primary);color:white;border:none;border-radius:2rem;padding:0.5rem 1.2rem;font-weight:700;cursor:pointer;text-decoration:none;font-size:0.9rem}
        .back-btn:hover{background:var(--primary-dark)}
        .lang-switch{display:flex;border:1.5px solid rgba(212,160,23,0.4);border-radius:2rem;overflow:hidden}
        .lang-btn{background:transparent;border:none;color:var(--text);font-weight:700;padding:0.3rem 0.8rem;font-size:0.8rem;cursor:pointer}
        .lang-btn.active{background:var(--primary);color:white}
        .content{flex:1;padding:2rem 1rem;max-width:1000px;margin:0 auto;width:100%}
        .page-icon{font-size:4rem;text-align:center;margin-bottom:1rem}
        .page-title{font-size:2rem;font-weight:900;text-align:center;margin-bottom:0.5rem;color:var(--primary)}
        .page-subtitle{text-align:center;font-size:1.1rem;opacity:0.8;margin-bottom:2rem}
        .feature-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem}
        .feature-card{background:var(--card-bg);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:1.8rem 1.5rem;text-align:center;transition:transform 0.3s,box-shadow 0.3s;display:flex;flex-direction:column;align-items:center}
        .feature-card:hover{transform:translateY(-5px);box-shadow:0 20px 35px rgba(0,0,0,0.5)}
        .feature-icon{font-size:2.8rem;margin-bottom:1rem;background:rgba(255,255,255,0.1);border-radius:50%;width:80px;height:80px;display:flex;align-items:center;justify-content:center}
        .feature-title{font-weight:800;font-size:1.3rem;margin-bottom:0.6rem}
        .feature-desc{font-size:0.9rem;opacity:0.8;margin-bottom:1.5rem;flex:1}
        .feature-btn{background:var(--primary);color:white;border:none;border-radius:2rem;padding:0.5rem 1.5rem;font-weight:700;text-decoration:none;transition:background 0.2s;display:inline-block;margin-top:auto}
        .feature-btn:hover{background:var(--primary-dark)}

        /* القائمة الجانبية العائمة */
        .float-map-btn{position:fixed;bottom:2rem;left:2rem;z-index:1000;width:50px;height:50px;border-radius:50%;background:#D4A017;color:#0A2540;font-size:1.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,0.5);transition:transform 0.3s,background 0.3s;border:none}
        html[dir="ltr"] .float-map-btn{left:auto;right:2rem}
        .float-map-btn:hover{transform:scale(1.1);background:#F5CC5A}
        .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;opacity:0;pointer-events:none;transition:opacity 0.3s}
        .sidebar-overlay.open{opacity:1;pointer-events:all}
        .sidebar-drawer{position:fixed;top:0;right:0;width:280px;height:100%;background:linear-gradient(180deg,#112240,#0A2540);z-index:1000;transform:translateX(100%);transition:transform 0.4s cubic-bezier(.4,0,.2,1);padding:2rem 1rem;overflow-y:auto;box-shadow:-5px 0 25px rgba(0,0,0,0.5);display:flex;flex-direction:column;gap:1rem}
        html[dir="ltr"] .sidebar-drawer{right:auto;left:0;transform:translateX(-100%)}
        .sidebar-drawer.open{transform:translateX(0)}
        .sidebar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
        .sidebar-title{font-size:1.4rem;font-weight:900;color:#D4A017;margin:0}
        .sidebar-close{background:none;border:none;color:#FEF5DC;font-size:1.8rem;cursor:pointer;padding:0;line-height:1}
        .sidebar-nav{display:flex;flex-direction:column;gap:0.8rem}
        .sidebar-item{display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1rem;border-radius:1rem;text-decoration:none;color:#FEF5DC;font-weight:600;background:rgba(255,255,255,0.03);transition:background 0.2s}
        .sidebar-item:hover{background:rgba(212,160,23,0.15);color:#D4A017}
        .sidebar-item i{font-size:1.5rem;width:2rem;text-align:center}
        .sidebar-item .item-text{flex:1}
    </style>
</head>
<body>
    <div class="header">
        <a href="../index.html" class="back-btn" id="backBtn">↩️ العودة للمدينة</a>
        <div class="lang-switch">
            <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
            <button class="lang-btn active" id="btnAr" onclick="setLang('ar')">عربي</button>
        </div>
    </div>

    <main class="content">
        <div class="page-icon">🕋</div>
        <h1 class="page-title" id="pageTitle">منارة العقيدة</h1>
        <p class="page-subtitle" id="pageSubtitle">البناء العقدي والروحي</p>

        <div class="feature-grid">
            <!-- بطاقة 1 -->
            <div class="feature-card">
                <div class="feature-icon">🎬</div>
                <div class="feature-title" id="card1Title">رحلة اليقين</div>
                <div class="feature-desc" id="card1Desc">فيديوهات عن مراقبة الله وقصص الثبات</div>
                <a href="#" class="feature-btn" id="card1Btn">شاهد الآن ←</a>
            </div>
            <!-- بطاقة 2 -->
            <div class="feature-card">
                <div class="feature-icon">📖</div>
                <div class="feature-title" id="card2Title">قصص الإيمان والثبات</div>
                <div class="feature-desc" id="card2Desc">قصة غلام الأخدود ونماذج من الصبر</div>
                <a href="#" class="feature-btn" id="card2Btn">اقرأ القصة ←</a>
            </div>
            <!-- بطاقة 3 -->
            <div class="feature-card">
                <div class="feature-icon">⭐</div>
                <div class="feature-title" id="card3Title">تحدي الإيمان</div>
                <div class="feature-desc" id="card3Desc">اختبر معلوماتك العقدية بأسئلة ممتعة</div>
                <a href="#" class="feature-btn" id="card3Btn">ابدأ التحدي ←</a>
            </div>
        </div>
    </main>

    <!-- زر الخريطة العائم -->
    <button class="float-map-btn" onclick="toggleSidebar()" title="خريطة المدينة">🗺️</button>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="sidebar-drawer" id="sidebarDrawer">
        <div class="sidebar-header">
            <h2 class="sidebar-title" id="sidebarTitle">🗺️ خريطة المدينة</h2>
            <button class="sidebar-close" onclick="closeSidebar()">✕</button>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
    </div>

    <script>
        const corners = [
            { id:'aqeeda', icon:'🕋', nameAr:'منارة العقيدة', nameEn:'Faith Minaret', url:'aqeeda.html' },
            { id:'ibada', icon:'🌙', nameAr:'واحة العبادة', nameEn:'Worship Oasis', url:'ibada.html' },
            { id:'quran', icon:'📖', nameAr:'بستان القرآن', nameEn:'Quran Garden', url:'quran.html' },
            { id:'social', icon:'🏘️', nameAr:'حيّنا الصغير', nameEn:'Our Little District', url:'social.html' },
            { id:'heart', icon:'💚', nameAr:'ركن القلب السليم', nameEn:'Pure Heart Corner', url:'heart.html' },
            { id:'history', icon:'🏰', nameAr:'حصن الأبطال', nameEn:"Heroes' Fortress", url:'history.html' },
            { id:'sport', icon:'🏊', nameAr:'النادي الرياضي', nameEn:'Sports Club', url:'sport.html' },
            { id:'academy', icon:'🔭', nameAr:'أكاديمية المبدعين', nameEn:"Creators' Academy", url:'academy.html' },
            { id:'quds', icon:'🕌', nameAr:'ركن القدس والأمة', nameEn:'Corner of Al-Quds & Ummah', url:'quds.html' },
            { id:'parents', icon:'👨🧕👦👧', nameAr:'ركن الأهل', nameEn:"Parents' Corner", url:'parents.html' }
        ];

        const translations = {
            ar: {
                backBtn: '↩️ العودة للمدينة',
                pageTitle: 'منارة العقيدة',
                pageSubtitle: 'البناء العقدي والروحي',
                card1Title: 'رحلة اليقين', card1Desc: 'فيديوهات عن مراقبة الله وقصص الثبات', card1Btn: 'شاهد الآن ←',
                card2Title: 'قصص الإيمان والثبات', card2Desc: 'قصة غلام الأخدود ونماذج من الصبر', card2Btn: 'اقرأ القصة ←',
                card3Title: 'تحدي الإيمان', card3Desc: 'اختبر معلوماتك العقدية بأسئلة ممتعة', card3Btn: 'ابدأ التحدي ←'
            },
            en: {
                backBtn: '↩️ Back to City',
                pageTitle: 'Faith Minaret',
                pageSubtitle: 'Spiritual & Creedal Foundation',
                card1Title: 'Journey of Certainty', card1Desc: 'Videos about Allah\'s watchfulness and steadfastness stories', card1Btn: 'Watch Now →',
                card2Title: 'Stories of Faith & Steadfastness', card2Desc: 'The story of the Boy and the King and examples of patience', card2Btn: 'Read the Story →',
                card3Title: 'Faith Challenge', card3Desc: 'Test your creed knowledge with fun questions', card3Btn: 'Start Challenge →'
            }
        };

        let lang = localStorage.getItem('bunyanLang') || 'ar';

        function setLang(l) {
            lang = l; localStorage.setItem('bunyanLang', l);
            document.documentElement.lang = l; document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('btnAr').classList.toggle('active', l === 'ar');
            document.getElementById('btnEn').classList.toggle('active', l === 'en');
            const t = translations[l];
            document.getElementById('backBtn').textContent = t.backBtn;
            document.getElementById('pageTitle').textContent = t.pageTitle;
            document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
            document.getElementById('card1Title').textContent = t.card1Title;
            document.getElementById('card1Desc').textContent = t.card1Desc;
            document.getElementById('card1Btn').textContent = t.card1Btn;
            document.getElementById('card2Title').textContent = t.card2Title;
            document.getElementById('card2Desc').textContent = t.card2Desc;
            document.getElementById('card2Btn').textContent = t.card2Btn;
            document.getElementById('card3Title').textContent = t.card3Title;
            document.getElementById('card3Desc').textContent = t.card3Desc;
            document.getElementById('card3Btn').textContent = t.card3Btn;
            buildSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebarDrawer').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebarDrawer').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
        function buildSidebar() {
            const nav = document.getElementById('sidebarNav');
            if (!nav) return;
            const isAr = lang === 'ar';
            nav.innerHTML = corners.map(c => {
                const name = isAr ? c.nameAr : c.nameEn;
                const url = c.url + '?lang=' + (isAr ? 'ar' : 'en');
                return `<a href="${url}" class="sidebar-item"><i>${c.icon}</i><span class="item-text">${name}</span></a>`;
            }).join('');
            nav.innerHTML += `<a href="../index.html" class="sidebar-item" style="margin-top:1rem; border-right:4px solid #D4A017;">
                <i>🏠</i><span class="item-text">${isAr ? 'الصفحة الرئيسية' : 'Main Page'}</span>
            </a>`;
            document.getElementById('sidebarTitle').textContent = isAr ? '🗺️ خريطة المدينة' : '🗺️ City Map';
        }

        setLang(lang);
        buildSidebar();
    </script>
</body>
</html>
