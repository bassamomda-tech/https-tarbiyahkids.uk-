document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:        #C9A961;\n  --rose:        #E8A5A5;\n\n  /* ---------- الطباعة ---------- */\n  --font-ar: 'Tajawal', 'Segoe UI', system-ui, sans-serif;\n  --font-en: 'Plus Jakarta Sans', system-ui, sans-serif;\n\n  /* ---------- الظلال ---------- */\n  --shadow-sm: 0 1px 2px rgba(31,37,64,0.04), 0 1px 3px rgba(31,37,64,0.04);\n  --shadow-md: 0 4px 12px rgba(31,37,64,0.06), 0 2px 4px rgba(31,37,64,0.04);\n  --shadow-lg: 0 12px 32px rgba(31,37,64,0.08), 0 4px 12px rgba(31,37,64,0.05);\n  --shadow-card: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 24px rgba(31,37,64,0.06);\n\n  /* ---------- نصف الأقطار ---------- */\n  --r-xs: 6px;\n  --r-sm: 10px;\n  --r-md: 14px;\n  --r-lg: 20px;\n  --r-xl: 28px;\n  --r-2xl: 36px;\n  --r-pill: 999px;\n\n  /* ---------- المسافات ---------- */\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-8: 32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n}\n\n/* ---------- Reset ---------- */\n*, *::before, *::after { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  font-family: var(--font-ar);\n  background: var(--bg);\n  color: var(--ink);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  line-height: 1.55;\n}\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\na { color: inherit; text-decoration: none; }\nimg { max-width: 100%; display: block; }\n<\u002Fstyle>\n<style>/* ============================================================\n   DASHBOARD — تنسيقات اللوحة الرئيسية\n   ============================================================ */\n\n/* ---------- الخلفية الزخرفية الناعمة ---------- */\n.bg-decor {\n  position: fixed; inset: 0; pointer-events: none; z-index: 0;\n  overflow: hidden;\n}\n.bg-decor::before, .bg-decor::after {\n  content: \"\"; position: absolute; border-radius: 50%;\n  filter: blur(70px); opacity: 0.55;\n}\n.bg-decor::before {\n  width: 520px; height: 520px;\n  background: var(--peach);\n  top: -180px; right: -120px;\n}\n.bg-decor::after {\n  width: 600px; height: 600px;\n  background: var(--mint);\n  bottom: -220px; left: -160px;\n}\n\n/* ---------- الحاوية ---------- */\n.shell {\n  position: relative; z-index: 1;\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: var(--s-6) var(--s-8) var(--s-16);\n}\n\n/* ============================================================\n   شريط علوي (Top Bar)\n   ============================================================ */\n.topbar {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: var(--s-3) var(--s-5);\n  background: rgba(255,255,255,0.7);\n  backdrop-filter: blur(10px);\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  box-shadow: var(--shadow-sm);\n  margin-bottom: var(--s-10);\n}\n.brand {\n  display: flex; align-items: center; gap: var(--s-3);\n}\n.brand-mark {\n  width: 44px; height: 44px;\n  border-radius: 14px;\n  background: linear-gradient(135deg, var(--brand) 0%, var(--mint-ink) 100%);\n  display: grid; place-items: center;\n  position: relative;\n  box-shadow: 0 4px 12px rgba(106,142,127,0.35);\n}\n.brand-mark::before {\n  content: \"\"; position: absolute; inset: 8px;\n  border: 2px solid #fff; border-radius: 50%;\n  border-top-color: transparent;\n  transform: rotate(-20deg);\n}\n.brand-mark::after {\n  content: \"\"; position: absolute; top: 9px; left: 50%;\n  transform: translateX(-50%);\n  width: 6px; height: 6px; border-radius: 50%; background: #fff;\n}\n.brand-name {\n  font-weight: 800; font-size: 18px; letter-spacing: -0.01em;\n  display: flex; flex-direction: column; line-height: 1.1;\n}\n.brand-name small {\n  font-weight: 500; font-size: 11px; color: var(--muted); letter-spacing: 0.02em;\n}\n\n.top-stats { display: flex; gap: var(--s-2); align-items: center; }\n.stat-chip {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 8px 14px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  font-weight: 600; font-size: 13px;\n}\n.stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }\n.stat-chip.gold .dot { background: var(--gold); }\n.stat-chip.rose .dot { background: var(--rose); }\n.profile-pill {\n  display: flex; align-items: center; gap: 10px;\n  padding: 4px 4px 4px 14px;\n  background: var(--surface);\n  border-radius: var(--r-pill);\n  border: 1px solid var(--line);\n  font-weight: 700; font-size: 13px;\n}\n.profile-pill .avatar {\n  width: 34px; height: 34px; border-radius: 50%;\n  background: linear-gradient(135deg, var(--butter), var(--peach));\n  display: grid; place-items: center;\n  font-weight: 800; color: var(--ink);\n  border: 2px solid #fff;\n}\n\n/* ============================================================\n   البطاقة الترحيبية (Hero)\n   ============================================================ */\n.hero {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr;\n  gap: var(--s-6);\n  margin-bottom: var(--s-10);\n}\n\n.hero-card {\n  position: relative;\n  background:\n    radial-gradient(140% 90% at 100% 0%, rgba(255,217,194,0.55), transparent 60%),\n    radial-gradient(120% 80% at 0% 100%, rgba(205,235,215,0.55), transparent 60%),\n    var(--surface-2);\n  border: 1px solid var(--line);\n  border-radius: var(--r-2xl);\n  padding: var(--s-8);\n  overflow: hidden;\n  box-shadow: var(--shadow-card);\n}\n.hero-eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 6px 12px;\n  background: rgba(255,255,255,0.85);\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  font-size: 12px; font-weight: 600; color: var(--brand-ink);\n}\n.hero-eyebrow .star {\n  width: 12px; height: 12px;\n  background: var(--brand-ink);\n  clip-path: polygon(50% 0, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);\n}\n.hero h1 {\n  font-size: clamp(28px, 3.4vw, 44px);\n  margin: var(--s-4) 0 var(--s-3);\n  font-weight: 800;\n  letter-spacing: -0.02em;\n  line-height: 1.15;\n  text-wrap: balance;\n}\n.hero h1 em {\n  font-style: normal;\n  background: linear-gradient(120deg, var(--brand) 0%, var(--lavender-ink) 100%);\n  -webkit-background-clip: text; background-clip: text;\n  color: transparent;\n}\n.hero p {\n  color: var(--ink-2);\n  font-size: 16px;\n  max-width: 52ch;\n  margin: 0 0 var(--s-6);\n}\n.hero-actions { display: flex; gap: var(--s-3); flex-wrap: wrap; }\n\n.btn-primary {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 14px 22px;\n  background: var(--ink);\n  color: #fff;\n  border-radius: var(--r-pill);\n  font-weight: 700; font-size: 14px;\n  transition: transform 0.18s ease, box-shadow 0.18s ease;\n  box-shadow: 0 6px 16px rgba(31,37,64,0.25);\n}\n.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(31,37,64,0.3); }\n.btn-primary .arrow { transition: transform 0.2s ease; }\n.btn-primary:hover .arrow { transform: translateX(-4px); }\n\n.btn-ghost {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 14px 22px;\n  background: var(--surface);\n  color: var(--ink);\n  border-radius: var(--r-pill);\n  font-weight: 700; font-size: 14px;\n  border: 1px solid var(--line);\n}\n.btn-ghost:hover { background: var(--bg-soft); }\n\n/* بطاقة التقدم */\n.progress-card {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-2xl);\n  padding: var(--s-6);\n  display: flex; flex-direction: column; gap: var(--s-5);\n  box-shadow: var(--shadow-card);\n}\n.progress-head { display: flex; align-items: center; justify-content: space-between; }\n.progress-head h3 { margin: 0; font-size: 16px; font-weight: 800; }\n.progress-head .pct { font-weight: 800; font-size: 22px; color: var(--brand-ink); }\n\n.ring-row { display: flex; align-items: center; gap: var(--s-5); }\n.ring {\n  --pct: 24;\n  width: 96px; height: 96px; flex-shrink: 0;\n  border-radius: 50%;\n  background:\n    conic-gradient(var(--brand) calc(var(--pct) * 1%), var(--brand-soft) 0);\n  display: grid; place-items: center;\n  position: relative;\n}\n.ring::after {\n  content: \"\"; position: absolute; inset: 8px; border-radius: 50%;\n  background: var(--surface);\n}\n.ring span {\n  position: relative; z-index: 1; font-weight: 800; font-size: 20px; color: var(--brand-ink);\n}\n.ring-meta { font-size: 13px; color: var(--muted); }\n.ring-meta strong { display: block; color: var(--ink); font-size: 15px; margin-bottom: 2px; }\n\n.badges-row {\n  display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--s-2);\n  padding-top: var(--s-4); border-top: 1px dashed var(--line);\n}\n.badge-mini {\n  aspect-ratio: 1;\n  border-radius: 14px;\n  display: grid; place-items: center;\n  position: relative;\n  font-size: 11px; font-weight: 700; color: var(--ink-2);\n}\n.badge-mini.earned { background: var(--butter); color: var(--butter-ink); }\n.badge-mini.earned::after {\n  content: \"\"; position: absolute; top: 4px; left: 4px;\n  width: 10px; height: 10px; border-radius: 50%; background: #fff;\n  box-shadow: 0 0 0 2px var(--butter-ink);\n}\n.badge-mini.locked { background: var(--bg-soft); color: var(--muted); }\n.badge-mini.locked::before {\n  content: \"\"; width: 14px; height: 14px;\n  background: currentColor;\n  -webkit-mask: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='currentColor' d='M6 10V8a6 6 0 1 1 12 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h8V8a4 4 0 1 0-8 0v2Z'/><\u002Fsvg>\") center/contain no-repeat;\n          mask: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='currentColor' d='M6 10V8a6 6 0 1 1 12 0v2h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h1Zm2 0h8V8a4 4 0 1 0-8 0v2Z'/><\u002Fsvg>\") center/contain no-repeat;\n  opacity: 0.55;\n}\n\n/* ============================================================\n   شريط التصفية (Filter)\n   ============================================================ */\n.filter-bar {\n  display: flex; align-items: center; justify-content: space-between;\n  gap: var(--s-4);\n  margin-bottom: var(--s-6);\n  flex-wrap: wrap;\n}\n.filter-tabs {\n  display: flex; gap: 6px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  padding: 5px;\n  box-shadow: var(--shadow-sm);\n  overflow-x: auto;\n}\n.filter-tabs button {\n  padding: 8px 16px;\n  border-radius: var(--r-pill);\n  font-weight: 700; font-size: 13px;\n  color: var(--ink-2);\n  transition: background 0.18s ease, color 0.18s ease;\n  white-space: nowrap;\n}\n.filter-tabs button:hover { background: var(--bg-soft); }\n.filter-tabs button.active {\n  background: var(--ink); color: #fff;\n}\n.filter-tabs .count {\n  font-size: 11px; padding: 1px 6px; border-radius: var(--r-pill);\n  background: rgba(0,0,0,0.06); margin-right: 6px;\n}\n.filter-tabs button.active .count { background: rgba(255,255,255,0.18); color: #fff; }\n\n.search-box {\n  display: flex; align-items: center; gap: 8px;\n  padding: 10px 16px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-pill);\n  box-shadow: var(--shadow-sm);\n  min-width: 260px;\n}\n.search-box svg { flex-shrink: 0; color: var(--muted); }\n.search-box input {\n  border: none; outline: none; background: transparent;\n  font-family: inherit; font-size: 13px; width: 100%;\n  color: var(--ink);\n}\n.search-box .kbd {\n  font-size: 10px; padding: 2px 6px; border-radius: 4px;\n  background: var(--bg-soft); color: var(--muted); font-weight: 700;\n  border: 1px solid var(--line);\n}\n\n/* ============================================================\n   الأقسام (Sections)\n   ============================================================ */\n.section { margin-bottom: var(--s-10); }\n\n.section-head {\n  display: flex; align-items: flex-end; justify-content: space-between;\n  margin-bottom: var(--s-5);\n  gap: var(--s-4);\n}\n.section-title-block { display: flex; gap: var(--s-4); align-items: center; }\n.section-icon {\n  width: 56px; height: 56px;\n  border-radius: var(--r-lg);\n  display: grid; place-items: center;\n  flex-shrink: 0;\n  position: relative;\n  font-weight: 800; font-size: 22px;\n}\n\n.section h2 {\n  margin: 0;\n  font-size: 24px;\n  font-weight: 800;\n  letter-spacing: -0.01em;\n}\n.section .sub {\n  margin: 4px 0 0;\n  font-size: 13px;\n  color: var(--muted);\n}\n.section-meta {\n  display: flex; align-items: center; gap: var(--s-3);\n  font-size: 13px; color: var(--muted); font-weight: 600;\n}\n.section-meta .bar {\n  width: 140px; height: 6px;\n  background: var(--bg-soft);\n  border-radius: var(--r-pill);\n  overflow: hidden;\n}\n.section-meta .bar > span {\n  display: block; height: 100%;\n  border-radius: var(--r-pill);\n}\n\n/* ألوان أقسام مختلفة */\n.section[data-color=\"peach\"]    .section-icon { background: var(--peach);    color: var(--peach-ink); }\n.section[data-color=\"mint\"]     .section-icon { background: var(--mint);     color: var(--mint-ink); }\n.section[data-color=\"lavender\"] .section-icon { background: var(--lavender); color: var(--lavender-ink); }\n.section[data-color=\"sky\"]      .section-icon { background: var(--sky);      color: var(--sky-ink); }\n.section[data-color=\"butter\"]   .section-icon { background: var(--butter);   color: var(--butter-ink); }\n\n.section[data-color=\"peach\"]    .section-meta .bar > span { background: var(--peach-ink); }\n.section[data-color=\"mint\"]     .section-meta .bar > span { background: var(--mint-ink); }\n.section[data-color=\"lavender\"] .section-meta .bar > span { background: var(--lavender-ink); }\n.section[data-color=\"sky\"]      .section-meta .bar > span { background: var(--sky-ink); }\n.section[data-color=\"butter\"]   .section-meta .bar > span { background: var(--butter-ink); }\n\n/* ============================================================\n   شبكة الأنشطة (Activity Grid)\n   ============================================================ */\n.grid {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  gap: var(--s-4);\n}\n@media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }\n@media (max-width: 720px)  { .grid { grid-template-columns: repeat(2, 1fr); } .hero { grid-template-columns: 1fr; } .shell { padding: var(--s-4); } }\n\n/* ============================================================\n   بطاقة النشاط (Activity Card)\n   ============================================================ */\n.card {\n  position: relative;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-radius: var(--r-xl);\n  padding: var(--s-4);\n  display: flex; flex-direction: column;\n  gap: var(--s-3);\n  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;\n  text-align: right;\n  cursor: pointer;\n  overflow: hidden;\n}\n.card::after {\n  content: \"\"; position: absolute; inset: 0;\n  border-radius: inherit;\n  pointer-events: none;\n  border: 1px solid transparent;\n  transition: border-color 0.22s ease;\n}\n.card:hover {\n  transform: translateY(-3px);\n  box-shadow: var(--shadow-lg);\n  border-color: transparent;\n}\n.card:hover::after {\n  border-color: var(--ink);\n}\n\n/* رأس البطاقة: مساحة الأيقونة */\n.card-thumb {\n  aspect-ratio: 4 / 3;\n  border-radius: var(--r-md);\n  position: relative;\n  overflow: hidden;\n  display: grid; place-items: center;\n}\n.card-thumb .num {\n  position: absolute; top: 8px; right: 8px;\n  background: rgba(255,255,255,0.85);\n  backdrop-filter: blur(4px);\n  font-weight: 800; font-size: 11px;\n  padding: 4px 8px;\n  border-radius: var(--r-pill);\n  color: var(--ink);\n  z-index: 2;\n  font-family: var(--font-en);\n  letter-spacing: 0.04em;\n}\n.card-thumb .glyph {\n  width: 60%; height: 60%;\n  display: grid; place-items: center;\n  position: relative; z-index: 1;\n}\n.card-thumb .glyph svg { width: 100%; height: 100%; }\n\n/* قفل وعلامة الإنجاز */\n.card-thumb .lock,\n.card-thumb .check {\n  position: absolute; top: 8px; left: 8px; z-index: 2;\n  width: 22px; height: 22px;\n  border-radius: 50%;\n  display: grid; place-items: center;\n  font-size: 11px; font-weight: 700;\n  border: 2px solid #fff;\n}\n.card-thumb .lock { background: rgba(255,255,255,0.85); color: var(--muted); }\n.card-thumb .check { background: var(--brand); color: #fff; }\n\n/* ألوان خلفية الأيقونات حسب القسم */\n.section[data-color=\"peach\"]    .card-thumb { background: linear-gradient(135deg, #FFE4D0 0%, #FFCFB0 100%); }\n.section[data-color=\"mint\"]     .card-thumb { background: linear-gradient(135deg, #DEEFE2 0%, #BFE2CB 100%); }\n.section[data-color=\"lavender\"] .card-thumb { background: linear-gradient(135deg, #ECE3FA 0%, #D4C6EB 100%); }\n.section[data-color=\"sky\"]      .card-thumb { background: linear-gradient(135deg, #E0EEF7 0%, #C3DDEE 100%); }\n.section[data-color=\"butter\"]   .card-thumb { background: linear-gradient(135deg, #FFF3CD 0%, #FFDF95 100%); }\n\n.section[data-color=\"peach\"]    .card-thumb .glyph { color: var(--peach-ink); }\n.section[data-color=\"mint\"]     .card-thumb .glyph { color: var(--mint-ink); }\n.section[data-color=\"lavender\"] .card-thumb .glyph { color: var(--lavender-ink); }\n.section[data-color=\"sky\"]      .card-thumb .glyph { color: var(--sky-ink); }\n.section[data-color=\"butter\"]   .card-thumb .glyph { color: var(--butter-ink); }\n\n/* جسم البطاقة */\n.card-body { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }\n.card-title {\n  font-size: 14px; font-weight: 800; line-height: 1.3;\n  color: var(--ink); margin: 0;\n  text-wrap: balance;\n}\n.card-mech {\n  font-size: 11px;\n  color: var(--muted);\n  font-family: var(--font-en);\n  letter-spacing: 0.02em;\n}\n\n/* ذيل البطاقة */\n.card-foot {\n  display: flex; align-items: center; justify-content: space-between;\n  padding-top: var(--s-2);\n  border-top: 1px dashed var(--line);\n  font-size: 11px; font-weight: 700;\n}\n.card-foot .difficulty {\n  display: inline-flex; align-items: center; gap: 2px;\n  color: var(--muted);\n}\n.card-foot .difficulty .dot {\n  width: 6px; height: 6px; border-radius: 50%;\n  background: var(--line);\n}\n.card-foot .difficulty .dot.on { background: var(--gold); }\n.card-foot .play {\n  display: inline-flex; align-items: center; gap: 4px;\n  color: var(--brand-ink);\n}\n.card[data-status=\"featured\"] .card-foot .play { color: var(--ink); }\n\n/* البطاقة المميزة (مفعّلة بالكامل) */\n.card[data-status=\"featured\"] {\n  background: var(--ink);\n  border-color: var(--ink);\n  color: #FBF6EC;\n}\n.card[data-status=\"featured\"] .card-title { color: #FBF6EC; }\n.card[data-status=\"featured\"] .card-mech { color: rgba(251,246,236,0.6); }\n.card[data-status=\"featured\"] .card-foot { border-top-color: rgba(255,255,255,0.15); }\n.card[data-status=\"featured\"] .card-foot .difficulty { color: rgba(251,246,236,0.7); }\n.card[data-status=\"featured\"] .card-thumb { background: linear-gradient(135deg, var(--butter) 0%, var(--peach) 100%); }\n.card[data-status=\"featured\"] .card-thumb .glyph { color: var(--ink); }\n.card[data-status=\"featured\"] .card-thumb .num { background: var(--ink); color: var(--butter); }\n.card[data-status=\"featured\"]::before {\n  content: \"النموذج المُفعَّل\";\n  position: absolute; top: 12px; left: 12px; z-index: 3;\n  font-size: 10px; font-weight: 800;\n  padding: 4px 8px; border-radius: var(--r-pill);\n  background: var(--butter); color: var(--ink);\n  letter-spacing: 0.02em;\n}\n\n/* عند تمرير الفأرة على بطاقة مغلقة */\n.card[data-locked=\"true\"] { opacity: 0.78; }\n.card[data-locked=\"true\"]:hover { opacity: 1; }\n\n/* ============================================================\n   التذييل (Footer)\n   ============================================================ */\n.foot {\n  margin-top: var(--s-16);\n  padding-top: var(--s-6);\n  border-top: 1px dashed var(--line);\n  display: flex; justify-content: space-between; align-items: center;\n  font-size: 12px; color: var(--muted);\n  flex-wrap: wrap; gap: var(--s-3);\n}\n.foot .links { display: flex; gap: var(--s-5); }\n.foot .links a:hover { color: var(--ink); }\n\n/* ---------- Animations ---------- */\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(8px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.card { animation: fadeUp 0.5s ease backwards; }\n.card:nth-child(1) { animation-delay: 0.02s; }\n.card:nth-child(2) { animation-delay: 0.04s; }\n.card:nth-child(3) { animation-delay: 0.06s; }\n.card:nth-child(4) { animation-delay: 0.08s; }\n.card:nth-child(5) { animation-delay: 0.10s; }\n.card:nth-child(6) { animation-delay: 0.12s; }\n.card:nth-child(7) { animation-delay: 0.14s; }\n.card:nth-child(8) { animation-delay: 0.16s; }\n.card:nth-child(9) { animation-delay: 0.18s; }\n.card:nth-child(10){ animation-delay: 0.20s; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- خلفية زخرفية ناعمة -->\n<div class=\"bg-decor\" aria-hidden=\"true\"><\u002Fdiv>\n\n<div class=\"shell\">\n\n  <!-- ============================================================\n       الشريط العلوي\n       ============================================================ -->\n  <header class=\"topbar\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\" aria-hidden=\"true\"><\u002Fdiv>\n      <div class=\"brand-name\">\n        أنوس\n        <small>منصة أنشطة الأطفال المسلمين<\u002Fsmall>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"top-stats\">\n      <span class=\"stat-chip\"><span class=\"dot\"><\u002Fspan> <span id=\"stat-playable\">1<\u002Fspan> نشاط متاح<\u002Fspan>\n      <span class=\"stat-chip gold\"><span class=\"dot\"><\u002Fspan> <span id=\"stat-badges\">0<\u002Fspan> وسام<\u002Fspan>\n      <span class=\"stat-chip rose\"><span class=\"dot\"><\u002Fspan> <span id=\"stat-streak\">0<\u002Fspan> أيام متتالية<\u002Fspan>\n      <span class=\"profile-pill\">\n        <span>أحمد<\u002Fspan>\n        <span class=\"avatar\">أ<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============================================================\n       البطاقة الترحيبية + التقدم\n       ============================================================ -->\n  <section class=\"hero\">\n    <div class=\"hero-card\">\n      <span class=\"hero-eyebrow\"><span class=\"star\"><\u002Fspan> 50 نشاطاً تفاعلياً<\u002Fspan>\n      <h1>تعلّم العقيدة واللغة والقيم<br> من خلال <em>اللعب المُمتع<\u002Fem><\u002Fh1>\n      <p>منصة تعليمية شاملة للأطفال من سن 6 إلى 12 سنة، تجمع بين الأذكار والسيرة واللغة العربية في 50 نشاطاً تفاعلياً مصمَّماً بعناية. كل نشاط يحفظ تقدّمك ويمنحك أوساماً تشجيعية.<\u002Fp>\n      <div class=\"hero-actions\">\n        <a class=\"btn-primary\" href=\"activities/wheel-of-dhikr.html\">\n          ابدأ بعجلة الأذكار\n          <svg class=\"arrow\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M15 6l-6 6 6 6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a class=\"btn-ghost\" href=\"#sections\">\n          استكشف الأنشطة\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <aside class=\"progress-card\">\n      <div class=\"progress-head\">\n        <h3>تقدّمك هذا الأسبوع<\u002Fh3>\n        <span class=\"pct\" id=\"progress-pct\">2%<\u002Fspan>\n      <\u002Fdiv>\n\n      <div class=\"ring-row\">\n        <div class=\"ring\" id=\"progress-ring\" style=\"--pct:2\">\n          <span>2%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"ring-meta\">\n          <strong id=\"progress-completed\">1/50 مكتمل<\u002Fstrong>\n          أكمل 4 أنشطة هذا الأسبوع لتحصل على وسام<br>«المثابر الصغير» 🏅\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px;\">\n          <strong>الأوسمة المكتسبة<\u002Fstrong>\n          <span style=\"color:var(--muted); font-size:12px;\">2 / 10<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"badges-row\">\n          <div class=\"badge-mini earned\">★<\u002Fdiv>\n          <div class=\"badge-mini earned\">★<\u002Fdiv>\n          <div class=\"badge-mini locked\"><\u002Fdiv>\n          <div class=\"badge-mini locked\"><\u002Fdiv>\n          <div class=\"badge-mini locked\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fsection>\n\n  <!-- ============================================================\n       شريط التصفية + البحث\n       ============================================================ -->\n  <div class=\"filter-bar\">\n    <div class=\"filter-tabs\" role=\"tablist\">\n      <button class=\"active\" data-filter=\"all\">الكل <span class=\"count\">50<\u002Fspan><\u002Fbutton>\n      <button data-filter=\"worship\">العبادات <span class=\"count\">10<\u002Fspan><\u002Fbutton>\n      <button data-filter=\"language\">اللغة <span class=\"count\">10<\u002Fspan><\u002Fbutton>\n      <button data-filter=\"art\">الفن <span class=\"count\">10<\u002Fspan><\u002Fbutton>\n      <button data-filter=\"science\">العلوم <span class=\"count\">10<\u002Fspan><\u002Fbutton>\n      <button data-filter=\"challenges\">التحديات <span class=\"count\">10<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n\n    <label class=\"search-box\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\"><\u002Fpath>\n      <\u002Fsvg>\n      <input id=\"search-input\" type=\"text\" placeholder=\"ابحث عن نشاط…\" aria-label=\"بحث\">\n      <span class=\"kbd\">/<\u002Fspan>\n    <\u002Flabel>\n  <\u002Fdiv>\n\n  <!-- ============================================================\n       الأقسام الخمسة + الأنشطة (تُولَّد ديناميكياً)\n       ============================================================ -->\n  <main id=\"sections\" aria-live=\"polite\"><\u002Fmain>\n\n  <!-- ============================================================\n       التذييل\n       ============================================================ -->\n  <footer class=\"foot\">\n    <span>© 2026 أنوس · صُمّمت بحب للأطفال المسلمين<\u002Fspan>\n    <nav class=\"links\">\n      <a href=\"#\">للوالدين<\u002Fa>\n      <a href=\"#\">الخصوصية<\u002Fa>\n      <a href=\"#\">حول المنصة<\u002Fa>\n    <\u002Fnav>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<!-- ============================================================\n     السكربتات\n     ============================================================ -->\n<script src=\"104bde01-5436-4332-83c1-aa45d5bcaf31\"><\u002Fscript>\n<script src=\"39d40619-750c-4739-995f-d343f8abbc79\"><\u002Fscript>\n<script src=\"70d6254e-8d85-433e-bc35-c99681c401f8\"><\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
